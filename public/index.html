<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Notify — Peon</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🔨</span>
        <h1>Claude Notify</h1>
        <span class="badge">Peon Edition</span>
      </div>
      <div class="status" id="status">
        <span class="status-dot"></span>
        <span class="status-text">连接中...</span>
      </div>
    </header>


    <!-- Sound Unlock Banner (required for autoplay policy) -->
    <div class="permission-banner unlock-banner" id="unlockBanner">
      <p>🔊 点击下方按钮解锁声音播放（浏览器要求用户交互后才能播放声音）</p>
      <button class="btn btn-primary" id="unlockSound">解锁声音</button>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="volume-control">
        <label for="volume">🔊 音量</label>
        <input type="range" id="volume" min="0" max="100" value="80">
        <span id="volumeValue">80%</span>
      </div>
      <button class="btn btn-secondary" id="testSound">测试音效</button>
    </div>

    <!-- Sound List -->
    <div class="sound-list">
      <h2>声音列表</h2>
      <div class="sounds" id="soundList">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Notification History -->
    <div class="history">
      <h2>通知历史</h2>
      <div class="history-list" id="historyList">
        <div class="empty-state">等待通知中... 🕐</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
